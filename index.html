<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Faaborg Tools">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="stylesheet" href="./assets/faaborg.css">
<title>Faaborg Tools</title>
</head>
<body>
<main class="ft-app">
  <header class="ft-home-header">
    <h1 class="ft-home-title">Faaborg Tools</h1>
    <div class="ft-home-subtitle">Enkle værktøjer</div>
  </header>

  <section class="ft-grid">
    <a class="ft-tool" href="./elbil/">
      <div class="ft-tool-symbol">ϟ</div>
      <div class="ft-tool-name">Elbil</div>
      <div class="ft-tool-description">Beregn ladetid</div>
    </a>

    <a class="ft-tool" href="./weight/">
      <div class="ft-tool-symbol">⚖︎</div>
      <div class="ft-tool-name">Weight</div>
      <div class="ft-tool-description">Materialevægt</div>
    </a>

    <a class="ft-tool" href="./tapet/">
      <div class="ft-tool-symbol">▦</div>
      <div class="ft-tool-name">Tapet</div>
      <div class="ft-tool-description">Tapetruller</div>
    </a>

    <a class="ft-tool" href="./profil/">
      <div class="ft-tool-symbol">⌁</div>
      <div class="ft-tool-name">Profil</div>
      <div class="ft-tool-description">DXF · SVG</div>
    </a>
  </section>
</main>

<button class="ft-info" id="infoButton" type="button" aria-label="Information">i</button>
<dialog class="ft-dialog" id="infoDialog">
  <h2>Faaborg Tools</h2>
  <p>En samling enkle værktøjer udviklet til iPhone og computer.</p>
  <p>Version 1.1<br>Designed by Søren Faaborg</p>
  <button id="closeInfo" type="button">Luk</button>
</dialog>

<script src="./assets/faaborg.js"></script>
<script>
FaaborgTools.bindInfoDialog();
FaaborgTools.registerServiceWorker('./sw.js');
</script>
</body>
</html>
