<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Ladetid</title>

<style>
:root{
  --number:#8a8d91;
  --text:#2f3133;
  --line:#e8e8e8;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--text);
}

body{
  overflow:hidden;
  padding:max(13px,env(safe-area-inset-top)) 13px max(13px,env(safe-area-inset-bottom));
}

.app{
  width:100%;
  max-width:430px;
  height:100%;
  margin:auto;
  display:grid;
  grid-template-rows:1fr auto auto;
  gap:13px;
}

.hero{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

#time{
  color:var(--number);
  font-size:clamp(76px,24vw,112px);
  line-height:.9;
  letter-spacing:-4px;
  font-weight:600;
}

#route{
  margin-top:13px;
  color:var(--number);
  font-size:clamp(19px,5vw,25px);
  font-weight:500;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.card{
  min-height:118px;
  padding:13px;
  border:1px solid var(--line);
  border-radius:13px;
  background:#fff;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.value{
  min-height:55px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

input{
  width:100%;
  border:0;
  outline:0;
  margin:0;
  padding:0;
  background:transparent;
  color:var(--number);
  text-align:center;
  font-size:clamp(38px,11vw,52px);
  line-height:1;
  font-weight:500;
  caret-color:#6f9cff;
  -webkit-appearance:none;
  appearance:none;
}

.unit{
  margin-top:8px;
  color:var(--number);
  font-size:18px;
  line-height:1;
  white-space:nowrap;
  pointer-events:none;
}

.divider{
  height:1px;
  margin:8px 0;
  background:var(--line);
}

.label{
  color:var(--text);
  font-size:16px;
  font-weight:500;
  text-align:center;
}

.info{
  justify-self:end;
  width:34px;
  height:34px;
  padding:0;
  border:1px solid var(--number);
  border-radius:50%;
  background:#fff;
  color:var(--number);
  font-size:17px;
  font-weight:600;
  line-height:31px;
  cursor:pointer;
}

.info-panel{
  display:none;
  position:fixed;
  left:13px;
  right:13px;
  bottom:max(55px,env(safe-area-inset-bottom));
  z-index:20;
  max-width:404px;
  margin:auto;
  padding:21px;
  border:1px solid var(--line);
  border-radius:13px;
  background:#fff;
  box-shadow:0 8px 34px rgba(0,0,0,.14);
}

.info-panel.open{display:block}

.info-row{
  display:flex;
  justify-content:space-between;
  gap:13px;
  padding:8px 0;
  color:#666;
  font-size:14px;
}

.info-row strong{
  color:var(--number);
  text-align:right;
}

.info-text{
  margin:13px 0 0;
  color:#777;
  font-size:13px;
  line-height:1.45;
}

.error{
  color:#a04444!important;
  font-size:28px!important;
  line-height:1.1!important;
  letter-spacing:-1px!important;
  text-align:center;
}

@media(max-height:700px){
  .app{gap:8px}
  #time{font-size:72px}
  .card{min-height:96px;padding:8px}
  input{font-size:36px}
  .unit{font-size:15px;margin-top:5px}
  .label{font-size:14px}
}
</style>
</head>

<body>
<form class="app" id="chargeForm" autocomplete="off">

  <main class="hero">
    <div id="time">4:12</div>
    <div id="route">20 % → 80 %</div>
  </main>

  <section class="grid">

    <label class="card">
      <div class="value">
        <input id="from" type="text" inputmode="numeric" pattern="[0-9]*"
               value="20" enterkeyhint="next" aria-label="Batteri nu">
        <span class="unit">%</span>
      </div>
      <div class="divider"></div>
      <div class="label">Nu</div>
    </label>

    <label class="card">
      <div class="value">
        <input id="to" type="text" inputmode="numeric" pattern="[0-9]*"
               value="80" enterkeyhint="next" aria-label="Mål">
        <span class="unit">%</span>
      </div>
      <div class="divider"></div>
      <div class="label">Mål</div>
    </label>

    <label class="card">
      <div class="value">
        <input id="capacity" type="text" inputmode="decimal"
               value="77" enterkeyhint="next" aria-label="Kapacitet">
        <span class="unit">kWh</span>
      </div>
      <div class="divider"></div>
      <div class="label">Kapacitet</div>
    </label>

    <label class="card">
      <div class="value">
        <input id="power" type="text" inputmode="decimal"
               value="11" enterkeyhint="done" aria-label="Ladeeffekt">
        <span class="unit">kW</span>
      </div>
      <div class="divider"></div>
      <div class="label">Ladeeffekt</div>
    </label>

  </section>

  <button id="infoButton" class="info" type="button" aria-label="Vis information">i</button>
</form>

<div id="infoPanel" class="info-panel" aria-hidden="true">
  <div class="info-row">
    <span>Energi til batteriet</span>
    <strong id="energyInfo">46,2 kWh</strong>
  </div>
  <div class="info-row">
    <span>Ladehastighed</span>
    <strong id="speedInfo">14,3 % pr. time</strong>
  </div>
  <p class="info-text">
    Beregningen forudsætter konstant ladeeffekt. Den virkelige ladetid kan være længere på grund af ladetab og bilens ladekurve.
  </p>
</div>

<script>
(function(){

  var fieldIds=["from","to","capacity","power"];
  var storageKey="ladeapp-vaerdier-v1";

  function readNumber(id){
    return parseFloat(
      String(document.getElementById(id).value).trim().replace(",",".")
    );
  }

  function oneDecimal(value){
    return value.toFixed(1).replace(".",",");
  }

  function saveValues(){
    var values={};
    fieldIds.forEach(function(id){
      values[id]=document.getElementById(id).value;
    });

    try{
      localStorage.setItem(storageKey,JSON.stringify(values));
    }catch(error){}
  }

  function loadValues(){
    try{
      var saved=localStorage.getItem(storageKey);
      if(!saved){return}

      var values=JSON.parse(saved);

      fieldIds.forEach(function(id){
        if(values[id]!==undefined && values[id]!==null && values[id]!==""){
          document.getElementById(id).value=values[id];
        }
      });
    }catch(error){}
  }

  function calculate(){
    var from=readNumber("from");
    var to=readNumber("to");
    var capacity=readNumber("capacity");
    var power=readNumber("power");

    var time=document.getElementById("time");
    var route=document.getElementById("route");

    if(
      isNaN(from) || isNaN(to) || isNaN(capacity) || isNaN(power) ||
      from<0 || from>100 || to<0 || to>100 ||
      capacity<=0 || power<=0
    ){
      time.className="error";
      time.textContent="Kontrollér tallene";
      route.textContent="";
      saveValues();
      return;
    }

    if(to<=from){
      time.className="error";
      time.textContent="Målet skal være højere";
      route.textContent="";
      saveValues();
      return;
    }

    var energy=capacity*(to-from)/100;
    var speed=power/capacity*100;
    var totalMinutes=Math.round((energy/power)*60);

    var hours=Math.floor(totalMinutes/60);
    var minutes=totalMinutes%60;

    time.className="";
    time.textContent=hours+":"+(minutes<10?"0":"")+minutes;
    route.textContent=Math.round(from)+" % → "+Math.round(to)+" %";

    document.getElementById("energyInfo").textContent=oneDecimal(energy)+" kWh";
    document.getElementById("speedInfo").textContent=oneDecimal(speed)+" % pr. time";

    saveValues();
  }

  loadValues();

  fieldIds.forEach(function(id,index){
    var field=document.getElementById(id);

    field.addEventListener("focus",function(){
      var current=this;
      setTimeout(function(){ current.select(); },50);
    });

    field.addEventListener("input",calculate);

    field.addEventListener("keydown",function(event){
      if(event.key==="Enter"){
        event.preventDefault();

        if(index<fieldIds.length-1){
          document.getElementById(fieldIds[index+1]).focus();
        }else{
          this.blur();
        }
      }
    });
  });

  document.getElementById("chargeForm").addEventListener("submit",function(event){
    event.preventDefault();
  });

  document.getElementById("infoButton").addEventListener("click",function(){
    var panel=document.getElementById("infoPanel");
    var isOpen=panel.classList.contains("open");

    if(isOpen){
      panel.classList.remove("open");
      panel.setAttribute("aria-hidden","true");
      this.textContent="i";
      this.setAttribute("aria-label","Vis information");
    }else{
      panel.classList.add("open");
      panel.setAttribute("aria-hidden","false");
      this.textContent="×";
      this.setAttribute("aria-label","Luk information");
    }
  });

  calculate();

})();
</script>
</body>
</html>
