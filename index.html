
<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#111111">
<title>Elbil – Ladetid</title>
<style>
:root{
  --bg:#f2f2f2;
  --card:#ffffff;
  --text:#111111;
  --muted:#666666;
  --line:#d9d9d9;
}
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}
body{
  min-height:100vh;
  padding:16px 14px 30px;
}
.app{
  width:100%;
  max-width:480px;
  margin:0 auto;
}
.card{
  background:var(--card);
  border-radius:18px;
  padding:20px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
}
h1{
  font-size:24px;
  line-height:1.15;
  margin:0 0 6px;
}
.intro{
  margin:0 0 20px;
  color:var(--muted);
  font-size:15px;
  line-height:1.4;
}
.field{margin-top:16px}
label{
  display:block;
  margin-bottom:7px;
  font-size:15px;
  font-weight:700;
}
.input-wrap{
  display:flex;
  align-items:center;
  border:1px solid var(--line);
  border-radius:12px;
  overflow:hidden;
  background:#fff;
}
input{
  width:100%;
  min-width:0;
  border:0;
  outline:0;
  padding:15px 14px;
  font-size:20px;
  font-weight:600;
  background:transparent;
}
.unit{
  padding:0 14px;
  color:var(--muted);
  font-size:15px;
  white-space:nowrap;
}
.result{
  margin-top:20px;
}
.main-result{
  text-align:center;
  padding:20px 12px;
  border-radius:14px;
  background:#f7f7f7;
}
.main-result .time{
  display:block;
  font-size:38px;
  line-height:1.05;
  font-weight:800;
  margin-bottom:6px;
}
.main-result .label{
  color:var(--muted);
  font-size:14px;
}
.details{
  margin-top:14px;
  border:1px solid var(--line);
  border-radius:12px;
  overflow:hidden;
}
.row{
  display:flex;
  justify-content:space-between;
  gap:14px;
  padding:12px 14px;
  border-bottom:1px solid var(--line);
  font-size:15px;
}
.row:last-child{border-bottom:0}
.row span:first-child{color:var(--muted)}
.row strong{text-align:right}
.note{
  margin:14px 2px 0;
  color:var(--muted);
  font-size:13px;
  line-height:1.45;
}
.error{
  padding:14px;
  border-radius:12px;
  background:#fff1f1;
  color:#8a1f1f;
  font-size:14px;
}
</style>
</head>
<body>
<main class="app">
  <section class="card">
    <h1>Elbil-ladeberegner</h1>
    <p class="intro">Beregn hvor lang tid det tager at lade fra nuværende til ønsket batteriprocent.</p>

    <div class="field">
      <label for="battery">Batteristørrelse</label>
      <div class="input-wrap">
        <input id="battery" type="number" value="77" min="0.1" step="0.1">
        <span class="unit">kWh</span>
      </div>
    </div>

    <div class="field">
      <label for="power">Ladeeffekt</label>
      <div class="input-wrap">
        <input id="power" type="number" value="11" min="0.1" step="0.1">
        <span class="unit">kW</span>
      </div>
    </div>

    <div class="field">
      <label for="current">Batteri nu</label>
      <div class="input-wrap">
        <input id="current" type="number" value="20" min="0" max="100" step="1">
        <span class="unit">%</span>
      </div>
    </div>

    <div class="field">
      <label for="target">Ønsket batteri</label>
      <div class="input-wrap">
        <input id="target" type="number" value="80" min="0" max="100" step="1">
        <span class="unit">%</span>
      </div>
    </div>

    <div class="result" id="result"></div>
  </section>
</main>

<script>
function getValue(id) {
  var text = document.getElementById(id).value;
  text = text.replace(",", ".");
  return parseFloat(text);
}

function decimal(value) {
  return value.toFixed(1).replace(".", ",");
}

function timeText(hours) {
  var totalMinutes = Math.round(hours * 60);
  var hoursPart = Math.floor(totalMinutes / 60);
  var minutesPart = totalMinutes % 60;

  if (hoursPart === 0) {
    return minutesPart + " min";
  }

  if (minutesPart === 0) {
    if (hoursPart === 1) {
      return "1 time";
    }
    return hoursPart + " timer";
  }

  return hoursPart + " t " + minutesPart + " min";
}

function calc() {
  var battery = getValue("battery");
  var power = getValue("power");
  var current = getValue("current");
  var target = getValue("target");
  var result = document.getElementById("result");

  if (
    isNaN(battery) ||
    isNaN(power) ||
    isNaN(current) ||
    isNaN(target) ||
    battery <= 0 ||
    power <= 0 ||
    current < 0 ||
    current > 100 ||
    target < 0 ||
    target > 100
  ) {
    result.innerHTML =
      '<div class="error">Indtast gyldige værdier. Batteriprocenter skal være mellem 0 og 100.</div>';
    return;
  }

  if (target <= current) {
    result.innerHTML =
      '<div class="error">Den ønskede batteriprocent skal være højere end den nuværende.</div>';
    return;
  }

  var percentageNeeded = target - current;
  var energyNeeded = battery * percentageNeeded / 100;
  var chargingTime = energyNeeded / power;
  var percentPerHour = power / battery * 100;

  var output = "";
  output += '<div class="main-result">';
  output += '<span class="time">' + timeText(chargingTime) + '</span>';
  output += '<span class="label">forventet ladetid</span>';
  output += '</div>';

  output += '<div class="details">';
  output += '<div class="row"><span>Der skal lades</span><strong>' +
            Math.round(percentageNeeded) + ' %</strong></div>';
  output += '<div class="row"><span>Energi til batteriet</span><strong>' +
            decimal(energyNeeded) + ' kWh</strong></div>';
  output += '<div class="row"><span>Ladehastighed</span><strong>' +
            decimal(percentPerHour) + ' % pr. time</strong></div>';
  output += '</div>';

  output += '<p class="note">Beregningen forudsætter konstant ladeeffekt og ser bort fra ladetab og bilens ladekurve.</p>';

  result.innerHTML = output;
}

document.getElementById("battery").addEventListener("input", calc);
document.getElementById("power").addEventListener("input", calc);
document.getElementById("current").addEventListener("input", calc);
document.getElementById("target").addEventListener("input", calc);

document.getElementById("battery").addEventListener("change", calc);
document.getElementById("power").addEventListener("change", calc);
document.getElementById("current").addEventListener("change", calc);
document.getElementById("target").addEventListener("change", calc);

calc();
</script>
</body>
</html>
