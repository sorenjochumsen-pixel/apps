<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#fff">
<title>Faaborg Tools</title>
<style>
:root{
--bg:#fff;--text:#3f3f42;--muted:#8a8d93;--card:#f5f5f7;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
margin:0;background:var(--bg);
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
color:var(--text);
}
.wrap{max-width:430px;margin:auto;min-height:100vh;padding:42px 18px 28px;position:relative}
h1{margin:0;text-align:center;font-size:46px;font-weight:700;letter-spacing:-.04em}
.sub{margin:8px 0 30px;text-align:center;color:var(--muted);font-size:18px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{
background:var(--card);border-radius:26px;
text-decoration:none;color:inherit;
height:170px;display:flex;flex-direction:column;
align-items:center;justify-content:center;
transition:.15s ease;
}
.card:active{transform:scale(.97)}
.icon{width:54px;height:54px;border:2px solid #8d8d93;border-radius:16px;
display:flex;align-items:center;justify-content:center;
font-size:28px;margin-bottom:18px;color:#666}
.title{font-size:21px;font-weight:650}
.desc{margin-top:6px;font-size:14px;color:var(--muted)}
.info{
position:absolute;right:22px;bottom:22px;
width:42px;height:42px;border-radius:50%;
border:1px solid #d8d8dc;background:#fff;
display:flex;align-items:center;justify-content:center;
font-size:22px;color:#777;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
<h1>Faaborg Tools</h1>
<div class="sub">Enkle værktøjer</div>

<div class="grid">
<a class="card" href="./elbil/">
<div class="icon">⚡</div>
<div class="title">Elbil</div>
<div class="desc">Beregn ladetid</div>
</a>

<a class="card" href="./weight/">
<div class="icon">⚖︎</div>
<div class="title">Weight</div>
<div class="desc">Materialevægt</div>
</a>

<a class="card" href="./tapet/">
<div class="icon">▦</div>
<div class="title">Tapet</div>
<div class="desc">Tapetruller</div>
</a>

<a class="card" href="./profil/">
<div class="icon">⌁</div>
<div class="title">Profil</div>
<div class="desc">DXF · SVG</div>
</a>
</div>

<a class="info" href="javascript:alert('Faaborg Tools\nVersion 1.0');">ⓘ</a>
</div>
</body>
</html>
