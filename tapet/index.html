<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tapetberegner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f0;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px;
  }
  .wrap { width: 100%; max-width: 480px; }
  h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 16px; }

  .metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .metric {
    background: #fff;
    border-radius: 12px;
    padding: 12px;
    border: 1px solid #e8e8e4;
  }
  .metric.accent { background: #EBF4FD; border-color: #b5d4f4; }
  .mlbl { font-size: 10px; color: #888; letter-spacing: .05em; margin-bottom: 3px; text-transform: uppercase; }
  .mval { font-size: 18px; font-weight: 600; color: #1a1a1a; }
  .metric.accent .mlbl { color: #185FA5; }
  .metric.accent .mval { color: #0C447C; }

  .card {
    background: #fff;
    border-radius: 16px;
    border: 1px solid #e8e8e4;
    padding: 16px;
  }
  .srow { margin-bottom: 16px; }
  .srow:last-of-type { margin-bottom: 0; }
  .sheader {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .slbl { font-size: 13px; color: #666; }
  .sval { font-size: 15px; font-weight: 600; color: #1a1a1a; }

  input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 32px;
    background: transparent;
    cursor: pointer;
    padding: 0;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 4px;
    border-radius: 2px;
    background: #ddd;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #fff;
    border: 2.5px solid #378ADD;
    margin-top: -14px;
    box-shadow: 0 1px 4px rgba(0,0,0,.12);
  }
  input[type=range]::-moz-range-track {
    height: 4px;
    border-radius: 2px;
    background: #ddd;
  }
  input[type=range]::-moz-range-thumb {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #fff;
    border: 2.5px solid #378ADD;
    box-shadow: 0 1px 4px rgba(0,0,0,.12);
  }

  .divider { border: none; border-top: 1px solid #efefeb; margin: 14px 0; }

  .notes { display: flex; flex-direction: column; gap: 6px; }
  .note {
    font-size: 12px;
    color: #666;
    padding: 5px 0 5px 10px;
    border-left: 2.5px solid #85B7EB;
  }

  .footer {
    text-align: center;
    margin-top: 16px;
    font-size: 11px;
    color: #aaa;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Tapetberegner</h1>

  <div class="metrics">
    <div class="metric">
      <div class="mlbl">Vægreal</div>
      <div class="mval" id="m-areal">66 m²</div>
    </div>
    <div class="metric">
      <div class="mlbl">Uden rapport</div>
      <div class="mval" id="m-uden">—</div>
    </div>
    <div class="metric accent">
      <div class="mlbl">Bestil</div>
      <div class="mval" id="m-med">—</div>
    </div>
  </div>

  <div class="card">
    <div class="srow">
      <div class="sheader"><span class="slbl">Vægreal</span><span class="sval"><span id="v-areal">66</span> m²</span></div>
      <input type="range" min="10" max="150" value="66" id="s-areal" step="1" oninput="b()">
    </div>
    <div class="srow">
      <div class="sheader"><span class="slbl">Rapport</span><span class="sval"><span id="v-rapport">90</span> cm</span></div>
      <input type="range" min="0" max="150" value="90" id="s-rapport" step="1" oninput="b()">
    </div>
    <div class="srow">
      <div class="sheader"><span class="slbl">Rullebredde</span><span class="sval"><span id="v-bredde">53</span> cm</span></div>
      <input type="range" min="40" max="100" value="53" id="s-bredde" step="1" oninput="b()">
    </div>
    <div class="srow">
      <div class="sheader"><span class="slbl">Rullelængde</span><span class="sval"><span id="v-laengde">10</span> m</span></div>
      <input type="range" min="5" max="20" value="10" id="s-laengde" step="1" oninput="b()">
    </div>
    <div class="srow">
      <div class="sheader"><span class="slbl">Loftshøjde</span><span class="sval"><span id="v-hoejde">2,0</span> m</span></div>
      <input type="range" min="150" max="400" value="200" id="s-hoejde" step="5" oninput="b()">
    </div>

    <hr class="divider">

    <div class="notes">
      <div class="note" id="note1">—</div>
      <div class="note" id="note2">—</div>
      <div class="note" id="note3">—</div>
    </div>
  </div>

  <div class="footer">Virker offline · åbn i Safari eller Chrome</div>
</div>

<script>
function b() {
  const A = parseInt(document.getElementById('s-areal').value);
  const R = parseInt(document.getElementById('s-rapport').value);
  const W = parseInt(document.getElementById('s-bredde').value) / 100;
  const L = parseInt(document.getElementById('s-laengde').value);
  const H = parseInt(document.getElementById('s-hoejde').value) / 100;

  document.getElementById('v-areal').textContent = A;
  document.getElementById('v-rapport').textContent = R;
  document.getElementById('v-bredde').textContent = parseInt(document.getElementById('s-bredde').value);
  document.getElementById('v-laengde').textContent = L;
  document.getElementById('v-hoejde').textContent = H.toFixed(1).replace('.', ',');
  document.getElementById('m-areal').textContent = A + ' m²';

  const base = A / (W * L);
  document.getElementById('m-uden').textContent = base.toFixed(1).replace('.', ',') + ' rul.';

  const Rm = R / 100;
  let factor = 1;
  if (Rm > 0) {
    const baner = Math.ceil(L / (H + Rm));
    factor = (baner * (H + Rm)) / (baner * H);
  }
  const justA = A * factor;
  const raw = justA / (W * L);
  const bestil = Math.ceil(raw) + 1;
  document.getElementById('m-med').textContent = bestil + ' ruller';

  const pct = Math.round((factor - 1) * 100);
  document.getElementById('note1').textContent = 'Bane: ' + H.toFixed(2).replace('.', ',') + ' + ' + Rm.toFixed(2).replace('.', ',') + ' m rapport = ' + (H + Rm).toFixed(2).replace('.', ',') + ' m';
  document.getElementById('note2').textContent = 'Rapportspild ~' + pct + '% → ' + justA.toFixed(1).replace('.', ',') + ' m² justeret';
  document.getElementById('note3').textContent = Math.ceil(raw) + ' beregnet + 1 sikkerhed = ' + bestil + ' ruller';
}
b();
</script>
</body>
</html>
