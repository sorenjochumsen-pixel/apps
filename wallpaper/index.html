<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Wallpaper">
<link rel="stylesheet" href="../assets/faaborg.css">
<title>Wallpaper Calculator</title>
</head>
<body>

<main class="ft-app">
  <section class="ft-result" aria-live="polite">
    <div class="ft-result-label">YOU NEED</div>
    <div id="resultNumber" class="ft-result-number">4</div>
    <div id="resultUnit" class="ft-result-unit">rolls</div>
    <div id="status" class="ft-status"></div>
  </section>

  <section class="ft-grid">
    <div class="ft-card">
      <label for="area">Wall area</label>
      <div class="ft-input-line">
        <input id="area" class="ft-input" inputmode="decimal" type="text" value="20">
        <span class="ft-unit">m²</span>
        <span class="ft-chevron" aria-hidden="true"></span>
      </div>
    </div>

    <div class="ft-card">
      <label for="height">Wall height</label>
      <div class="ft-input-line">
        <input id="height" class="ft-input" inputmode="decimal" type="text" value="2.50">
        <span class="ft-unit">m</span>
        <span class="ft-chevron" aria-hidden="true"></span>
      </div>
    </div>

    <div class="ft-card">
      <label for="rollWidth">Roll width</label>
      <div class="ft-input-line">
        <input id="rollWidth" class="ft-input" inputmode="decimal" type="text" value="53">
        <span class="ft-unit">cm</span>
        <span class="ft-chevron" aria-hidden="true"></span>
      </div>
    </div>

    <div class="ft-card">
      <label for="rollLength">Roll length</label>
      <div class="ft-input-line">
        <input id="rollLength" class="ft-input" inputmode="decimal" type="text" value="10">
        <span class="ft-unit">m</span>
        <span class="ft-chevron" aria-hidden="true"></span>
      </div>
    </div>

    <div class="ft-card">
      <label for="repeat">Pattern repeat</label>
      <div class="ft-input-line">
        <input id="repeat" class="ft-input" inputmode="decimal" type="text" value="0">
        <span class="ft-unit">cm</span>
        <span class="ft-chevron" aria-hidden="true"></span>
      </div>
    </div>

    <div class="ft-card">
      <label for="waste">Extra allowance</label>
      <div class="ft-input-line">
        <input id="waste" class="ft-input" inputmode="decimal" type="text" value="0">
        <span class="ft-unit">%</span>
        <span class="ft-chevron" aria-hidden="true"></span>
      </div>
    </div>
  </section>
</main>

<button id="infoButton" class="ft-info" type="button" aria-label="Information">i</button>

<dialog id="infoDialog" class="ft-dialog">
  <h2>Wallpaper Calculator</h2>
  <p>Enter the total wall area without subtracting small doors and windows.</p>
  <p>For patterned wallpaper, enter the pattern repeat in centimetres.</p>
  <p>The calculation uses whole drops and whole rolls only.</p>
  <p class="ft-signature">Designed by Søren Faaborg<br>Version 3.0</p>
  <button id="closeInfo" type="button">Close</button>
</dialog>

<script src="../assets/faaborg.js"></script>
<script>
'use strict';

const resultNumber = document.getElementById('resultNumber');
const resultUnit = document.getElementById('resultUnit');
const status = document.getElementById('status');

function value(id) {
  return FaaborgUI.parseNumber(document.getElementById(id).value);
}

function showError(message) {
  resultNumber.textContent = '—';
  resultUnit.textContent = 'rolls';
  status.textContent = message;
}

function calculate() {
  const area = value('area');
  const height = value('height');
  const rollWidth = value('rollWidth') / 100;
  const rollLength = value('rollLength');
  const repeat = value('repeat') / 100;
  const allowance = value('waste');

  if (area <= 0) return showError('Enter a positive wall area');
  if (height <= 0) return showError('Enter a positive wall height');
  if (rollWidth <= 0) return showError('Enter a positive roll width');
  if (rollLength <= 0) return showError('Enter a positive roll length');
  if (repeat < 0 || allowance < 0) {
    return showError('Repeat and allowance cannot be negative');
  }

  const adjustedArea = area * (1 + allowance / 100);
  const cutLength = repeat > 0
    ? Math.ceil(height / repeat) * repeat
    : height;

  const dropsPerRoll = Math.floor((rollLength + 1e-9) / cutLength);

  if (dropsPerRoll < 1) {
    return showError('The roll is shorter than one wallpaper drop');
  }

  const areaPerDrop = height * rollWidth;
  const dropsNeeded = Math.ceil(adjustedArea / areaPerDrop);
  const rolls = Math.ceil(dropsNeeded / dropsPerRoll);

  resultNumber.textContent = FaaborgUI.formatNumber(rolls);
  resultUnit.textContent = rolls === 1 ? 'roll' : 'rolls';
  status.textContent =
    `${dropsNeeded} drops · ${dropsPerRoll} per roll · ` +
    `${FaaborgUI.formatNumber(cutLength, 2)} m per drop`;
}

FaaborgUI.bindNumberInputs({
  selector: '.ft-input',
  storageKey: 'faaborg-wallpaper-v3',
  onChange: calculate
});

FaaborgUI.bindDialog({
  openButton: '#infoButton',
  dialog: '#infoDialog',
  closeButton: '#closeInfo'
});
</script>
</body>
</html>
