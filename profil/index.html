<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Profil til DXF</title>
  <style>
    :root{
      --bg:#f3f3f3; --card:#fff; --text:#111; --muted:#6b6b6b;
      --line:#d7d7d7; --accent:#111;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:var(--bg); color:var(--text);
    }
    .wrap{max-width:760px;margin:0 auto;padding:20px}
    h1{font-size:28px;margin:8px 0 6px;text-align:center}
    .intro{color:var(--muted);text-align:center;margin:0 0 18px}
    .card{
      background:var(--card); border:1px solid var(--line); border-radius:16px;
      padding:18px; margin-bottom:16px;
    }
    label{display:block;font-weight:650;margin-bottom:7px}
    input[type=file], input[type=number], input[type=range]{
      width:100%;
    }
    input[type=number]{
      height:46px;border:1px solid var(--line);border-radius:10px;padding:0 12px;font-size:18px;
    }
    input[type=file]{
      border:1px dashed #aaa;border-radius:12px;padding:18px;background:#fafafa;
    }
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .range-row{display:grid;grid-template-columns:1fr 70px;gap:12px;align-items:center}
    .value{
      text-align:center;border:1px solid var(--line);border-radius:9px;padding:9px 5px;background:#fafafa;
    }
    canvas{
      width:100%;height:auto;max-height:560px;object-fit:contain;background:white;border:1px solid var(--line);
      border-radius:12px;
    }
    button{
      width:100%;border:0;border-radius:12px;padding:15px 18px;font-size:18px;font-weight:700;
      background:var(--accent);color:white;cursor:pointer;
    }
    button:disabled{opacity:.35;cursor:not-allowed}
    .status{min-height:24px;text-align:center;color:var(--muted);margin-top:10px}
    .small{font-size:13px;color:var(--muted);line-height:1.4}
    @media(max-width:600px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <h1>Profil til DXF</h1>
  <p class="intro">Upload en sort profil på hvid baggrund, angiv højden og hent en lukket DXF-kontur.</p>

  <div class="card">
    <label for="file">Profilbillede</label>
    <input id="file" type="file" accept="image/*">
  </div>

  <div class="card grid">
    <div>
      <label for="heightMm">Profilens højde i mm</label>
      <input id="heightMm" type="number" min="1" step="0.1" value="90">
    </div>
    <div>
      <label for="threshold">Sort/hvid-grænse</label>
      <div class="range-row">
        <input id="threshold" type="range" min="10" max="245" value="120">
        <div id="thresholdValue" class="value">120</div>
      </div>
    </div>
  </div>

  <div class="card">
    <label for="simplify">Forenkling af konturen</label>
    <div class="range-row">
      <input id="simplify" type="range" min="0.2" max="5" step="0.1" value="1.0">
      <div id="simplifyValue" class="value">1,0</div>
    </div>
    <p class="small">Lav værdi følger billedet tættere. Høj værdi giver færre segmenter og en lettere SketchUp-fil.</p>
  </div>

  <div class="card">
    <canvas id="canvas" width="800" height="600"></canvas>
    <div id="status" class="status">Indlæser billedmotor…</div>
  </div>

  <button id="download" disabled>Hent DXF</button>
</div>

<script async src="https://docs.opencv.org/4.x/opencv.js" onload="cvReady()"></script>
<script>
let cvIsReady = false;
let sourceImage = null;
let currentPoints = [];

const fileInput = document.getElementById('file');
const heightInput = document.getElementById('heightMm');
const thresholdInput = document.getElementById('threshold');
const simplifyInput = document.getElementById('simplify');
const thresholdValue = document.getElementById('thresholdValue');
const simplifyValue = document.getElementById('simplifyValue');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');
const downloadBtn = document.getElementById('download');

function cvReady(){
  if (typeof cv === 'undefined') return;
  cv['onRuntimeInitialized'] = () => {
    cvIsReady = true;
    status.textContent = 'Klar';
    processImage();
  };
}

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    sourceImage = img;
    processImage();
    URL.revokeObjectURL(img.src);
  };
  img.src = URL.createObjectURL(file);
});

thresholdInput.addEventListener('input', () => {
  thresholdValue.textContent = thresholdInput.value;
  processImage();
});
simplifyInput.addEventListener('input', () => {
  simplifyValue.textContent = Number(simplifyInput.value).toFixed(1).replace('.', ',');
  processImage();
});
heightInput.addEventListener('input', processImage);

function processImage(){
  if (!cvIsReady || !sourceImage) return;

  const maxW = 1200, maxH = 1200;
  const scale = Math.min(maxW/sourceImage.width, maxH/sourceImage.height, 1);
  canvas.width = Math.max(1, Math.round(sourceImage.width * scale));
  canvas.height = Math.max(1, Math.round(sourceImage.height * scale));
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(sourceImage,0,0,canvas.width,canvas.height);

  let src = cv.imread(canvas);
  let gray = new cv.Mat();
  let binary = new cv.Mat();
  let contours = new cv.MatVector();
  let hierarchy = new cv.Mat();

  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
  cv.threshold(gray, binary, Number(thresholdInput.value), 255, cv.THRESH_BINARY_INV);
  cv.findContours(binary, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_NONE);

  if (contours.size() === 0){
    status.textContent = 'Ingen profil fundet. Justér sort/hvid-grænsen.';
    downloadBtn.disabled = true;
    cleanup();
    return;
  }

  let largestIndex = 0, largestArea = -1;
  for(let i=0;i<contours.size();i++){
    const area = cv.contourArea(contours.get(i));
    if(area > largestArea){ largestArea = area; largestIndex = i; }
  }

  const contour = contours.get(largestIndex);
  let approx = new cv.Mat();
  cv.approxPolyDP(contour, approx, Number(simplifyInput.value), true);

  let rect = cv.boundingRect(contour);
  const targetHeight = Number(heightInput.value);
  if(!(targetHeight > 0)){
    status.textContent = 'Angiv en gyldig højde.';
    downloadBtn.disabled = true;
    approx.delete(); contour.delete(); cleanup();
    return;
  }

  const mmPerPixel = targetHeight / rect.height;
  currentPoints = [];
  for(let i=0;i<approx.rows;i++){
    const x = approx.intPtr(i,0)[0];
    const y = approx.intPtr(i,0)[1];
    currentPoints.push({
      x: (x - rect.x) * mmPerPixel,
      y: (rect.height - (y - rect.y)) * mmPerPixel
    });
  }

  // Preview
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for(let i=0;i<approx.rows;i++){
    const x = approx.intPtr(i,0)[0];
    const y = approx.intPtr(i,0)[1];
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.stroke();

  const widthMm = rect.width * mmPerPixel;
  status.textContent = `Kontur: ${currentPoints.length} punkter · ca. ${widthMm.toFixed(1).replace('.',',')} × ${targetHeight.toFixed(1).replace('.',',')} mm`;
  downloadBtn.disabled = currentPoints.length < 3;

  approx.delete();
  contour.delete();
  cleanup();

  function cleanup(){
    src.delete(); gray.delete(); binary.delete(); contours.delete(); hierarchy.delete();
  }
}

function makeDXF(points){
  const a = [
    '0','SECTION','2','HEADER',
    '9','$INSUNITS','70','4',
    '0','ENDSEC',
    '0','SECTION','2','ENTITIES',
    '0','LWPOLYLINE',
    '8','PROFILE',
    '90',String(points.length),
    '70','1'
  ];
  for(const p of points){
    a.push('10',p.x.toFixed(4),'20',p.y.toFixed(4));
  }
  a.push('0','ENDSEC','0','EOF');
  return a.join('\n');
}

downloadBtn.addEventListener('click', () => {
  const dxf = makeDXF(currentPoints);
  const blob = new Blob([dxf], {type:'application/dxf'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const height = Number(heightInput.value).toString().replace('.', '_');
  a.href = url;
  a.download = `profil_${height}mm.dxf`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
